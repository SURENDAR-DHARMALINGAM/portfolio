<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme -->
    <meta name="theme-color" content="#043082" />

    <!-- SEO Title -->

      name="description"
      content="Professional portfolio of Surendar Dharmalingam - Python Full Stack Developer specializing in Django, React, REST APIs, and scalable web application development."

    <meta
      name="keywords"
      content="Surendar Dharmalingam, Python Full Stack Developer, Python Developer, Django Developer, React Developer, Portfolio, Web Developer, REST API Developer"
    />

    <meta name="author" content="Surendar Dharmalingam" />

    <!-- Canonical -->

    <!-- Favicon -->

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (LinkedIn / WhatsApp / Facebook / Discord / Slack) -->

    <meta property="og:site_name" content="Surendar Portfolio" />

    <meta
      property="og:title"
      content="Surendar Dharmalingam | Python Full Stack Developer"
    />

    <meta
      property="og:description"
      content="Explore my portfolio featuring Python Full Stack projects, technical skills, and modern web development expertise."
    />

    <meta
      property="og:url"
      content="https://surea-portfolio.vercel.app/"
    />

    <meta
      property="og:image"
      content="https://surea-portfolio.vercel.app/preview.png"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta
      property="og:image:alt"
      content="Surendar Dharmalingam Portfolio Preview"
    />

    <!-- Twitter / X -->

      name="twitter:card"
      content="summary_large_image"
    />

      name="twitter:title"
      content="Surendar Dharmalingam | Python Full Stack Developer"
    />

    <meta
      name="twitter:description"
